# --- AMCO partial-monotone mixer parameters ---

action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 50000

runner: "episode"
buffer_size: 5000
target_update_interval: 200

agent_output_type: "q"
learner: "q_learner"
double_q: True
mixer: "amco"

amco_state_embed_dim: 104
amco_mono_hidden_dim: 96
amco_mono_depth: 4
amco_state_encoder_depth: 2
amco_state_activation: "silu"
amco_mono_activation: "relu"
amco_state_value_dim: 32
amco_state_value_activation: "relu"
amco_state_input_scale: 0.3
amco_state_input_scale_by_map:
  MMM2: 0.3
  3s_vs_5z: 0.3
  2s3z: 0.3
  3s5z: 0.3
  1c3s5z: 0.25
  5m_vs_6m: 0.25
  bane_vs_bane: 0.25
  2c_vs_64zg: 0.3
  27m_vs_30m: 0.25

name: "amco"
