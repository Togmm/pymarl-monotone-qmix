# --- SMNN partial-monotone mixer parameters ---

action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 50000

runner: "episode"
buffer_size: 5000
target_update_interval: 200

agent_output_type: "q"
learner: "q_learner"
double_q: True
mixer: "smnn"

# Set to 0 to feed the raw state to the non-monotone branch.
smnn_state_embed_dim: 0
smnn_state_encoder_depth: 1
smnn_state_activation: "silu"
smnn_exp_unit_size: [148, 148]
smnn_relu_unit_size: [34, 34]
smnn_conf_unit_size: [76, 76]
smnn_output_weight_mean: -2.5
smnn_output_weight_std: 0.5
smnn_zero_input_baseline: True
smnn_state_value_dim: 32
smnn_state_value_activation: "relu"

name: "smnn"
